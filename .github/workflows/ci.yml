name: MLflow CI

on:
  push:
    branches:
      - main

jobs:

  train-model:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r MLProject/requirements.txt

      - name: Run Training
        run: |
          cd MLProject
          python modelling.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_number }}
          path: MLProject

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Set MLflow Tracking URI
        run: |
          echo "Using local MLflow tracking"

      - name: Get Latest MLflow Run ID
        run: |
          echo "Training completed"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject

      - name: Build Docker Model
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/telco-churn:latest ./MLProject

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/telco-churn:latest
